<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 汪汪队英语乐园 - 分享卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Sans MS', 'YouYuan', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .share-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }
        
        .card-header {
            background: linear-gradient(135deg, #E74C3C 0%, #E67E22 100%);
            color: white;
            padding: 30px 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, -20px); }
        }
        
        .main-emoji {
            font-size: 80px;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
            position: relative;
            z-index: 1;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .card-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
        }
        
        .card-subtitle {
            font-size: 16px;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }
        
        .card-body {
            padding: 35px 25px;
        }
        
        .features {
            margin-bottom: 30px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            border-left: 4px solid #E74C3C;
        }
        
        .feature-icon {
            font-size: 28px;
            margin-right: 15px;
        }
        
        .feature-text {
            font-size: 15px;
            color: #2C3E50;
            line-height: 1.4;
        }
        
        .qr-section {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, #fef9e7 0%, #fcf3cf 100%);
            border-radius: 20px;
            margin-top: 20px;
        }
        
        .qr-title {
            font-size: 18px;
            font-weight: bold;
            color: #E74C3C;
            margin-bottom: 15px;
        }
        
        .qr-code {
            width: 200px;
            height: 200px;
            margin: 0 auto 15px;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qr-code svg {
            width: 180px;
            height: 180px;
        }
        
        .qr-hint {
            font-size: 14px;
            color: #7F8C8D;
            margin-bottom: 10px;
        }
        
        .scan-instruction {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
            color: #2C3E50;
            font-weight: bold;
        }
        
        .scan-icon {
            font-size: 24px;
            animation: scan 2s infinite;
        }
        
        @keyframes scan {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .card-footer {
            padding: 20px;
            background: #f8f9fa;
            text-align: center;
            font-size: 13px;
            color: #7F8C8D;
        }
        
        .badge-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        
        .badge {
            background: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            color: #E74C3C;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .print-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #E74C3C 0%, #E67E22 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.3);
            transition: all 0.3s ease;
        }
        
        .print-btn:active {
            transform: scale(0.98);
        }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .print-btn {
                display: none;
            }
            .share-card {
                box-shadow: none;
            }
        }
    </style>
</head>
