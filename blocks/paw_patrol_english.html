    <script>
        // ==================== 音频系统核心 ====================
        class AudioSystem {
            constructor() {
                this.speechSynthesis = window.speechSynthesis;
                this.isSpeaking = false;
                this.autoPlay = true;
                this.repeatMode = false;
                this.muted = false;
                this.currentUtterance = null;
                
                this.voiceSettings = {
                    'en-US': { rate: 0.75, pitch: 1.1, volume: 1.0 },
                    'zh-CN': { rate: 0.85, pitch: 1.0, volume: 1.0 }
                };
                
                this.init();
            }
            
            init() {
                if (!('speechSynthesis' in window)) {
                    alert('您的浏览器不支持语音合成功能，请使用 Chrome、Safari 或 Edge 浏览器');
                    return false;
                }
                setTimeout(() => {
                    const voices = this.speechSynthesis.getVoices();
                    console.log('可用语音:', voices.length);
                }, 100);
                return true;
            }
            
            speakEnglish(text) {
                if (this.muted) return;
                this.speak(text, 'en-US');
            }
            
            speakChinese(text) {
                if (this.muted) return;
                this.speak(text, 'zh-CN');
            }
            
            speak(text, lang = 'en-US') {
                if (this.isSpeaking) {
                    this.speechSynthesis.cancel();
                }
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                
                const settings = this.voiceSettings[lang];
                utterance.rate = settings.rate;
                utterance.pitch = settings.pitch;
                utterance.volume = settings.volume;
                
                const voices = this.speechSynthesis.getVoices();
                const targetVoice = voices.find(voice => voice.lang === lang) || voices[0];
                if (targetVoice) {
                    utterance.voice = targetVoice;
                }
                
                utterance.onstart = () => {
                    this.isSpeaking = true;
                    this.currentUtterance = utterance;
                    this.onSpeechStart(text, lang);
                };
                
                utterance.onend = () => {
                    this.isSpeaking = false;
                    this.currentUtterance = null;
                    this.onSpeechEnd(text, lang);
                    
                    if (this.repeatMode) {
                        setTimeout(() => this.speak(text, lang), 1200);
                    }
                };
                
                utterance.onerror = (event) => {
                    this.isSpeaking = false;
                    this.currentUtterance = null;
                    console.error('语音播放错误:', event.error);
                };
                
                this.speechSynthesis.speak(utterance);
            }
            
            stop() {
                if (this.isSpeaking) {
                    this.speechSynthesis.cancel();
                    this.isSpeaking = false;
                }
            }
            
            toggleAutoPlay() {
                this.autoPlay = !this.autoPlay;
                return this.autoPlay;
            }
            
            toggleRepeat() {
                this.repeatMode = !this.repeatMode;
                return this.repeatMode;
            }
            
            toggleMute() {
                this.muted = !this.muted;
                if (this.muted && this.isSpeaking) {
                    this.stop();
                }
                return this.muted;
            }
            
            onSpeechStart(text, lang) {
                const playingElements = document.querySelectorAll('.playing');
                playingElements.forEach(el => el.classList.remove('playing'));
                
                if (lang === 'en-US') {
                    const wordEl = document.getElementById('currentWord');
                    if (wordEl && wordEl.textContent === text) {
                        wordEl.classList.add('playing');
                        document.getElementById('currentEmoji').classList.add('playing');
                    }
                } else {
                    const transEl = document.getElementById('currentTranslation');
                    if (transEl && transEl.textContent === text) {
                        transEl.classList.add('playing');
                    }
                }
            }
            
            onSpeechEnd(text, lang) {
                const playingElements = document.querySelectorAll('.playing');
                playingElements.forEach(el => el.classList.remove('playing'));
            }
        }

                        { word: 'cookie', chinese: '饼干', emoji: '🍪' },
                        { word: 'candy', chinese: '糖果', emoji: '🍬' },
                        { word: 'ice cream', chinese: '冰淇淋', emoji: '🍦' },
                        { word: 'pizza', chinese: '披萨', emoji: '🍕' },
                        { word: 'hamburger', chinese: '汉堡', emoji: '🍔' },
                        { word: 'noodle', chinese: '面条', emoji: '🍜' },
                        { word: 'cheese', chinese: '奶酪', emoji: '🧀' }
                    ]
                },
                {
                    id: 'vehicles',
                    name: '交通工具',
                    emoji: '🚗',
                    words: [
                        { word: 'car', chinese: '汽车', emoji: '🚗' },
                        { word: 'bus', chinese: '公交车', emoji: '🚌' },
                        { word: 'train', chinese: '火车', emoji: '🚂' },
                        { word: 'plane', chinese: '飞机', emoji: '✈️' },
                        { word: 'boat', chinese: '船', emoji: '⛵' },
                        { word: 'bike', chinese: '自行车', emoji: '🚲' },
                        { word: 'truck', chinese: '卡车', emoji: '🚚' },
                        { word: 'taxi', chinese: '出租车', emoji: '🚕' },
                        { word: 'ship', chinese: '轮船', emoji: '🚢' },
                        { word: 'rocket', chinese: '火箭', emoji: '🚀' },
                        { word: 'helicopter', chinese: '直升机', emoji: '🚁' },
                        { word: 'ambulance', chinese: '救护车', emoji: '🚑' }
                    ]
                },
                {
                    id: 'nature',
                    name: '大自然',
                    emoji: '🌞',
                    words: [
                        { word: 'sun', chinese: '太阳', emoji: '🌞' },
                        { word: 'moon', chinese: '月亮', emoji: '🌙' },
                        { word: 'star', chinese: '星星', emoji: '⭐' },
                        { word: 'sky', chinese: '天空', emoji: '☁️' },
                        { word: 'cloud', chinese: '云', emoji: '☁️' },
                        { word: 'rain', chinese: '雨', emoji: '🌧️' },
                        { word: 'snow', chinese: '雪', emoji: '❄️' },
                        { word: 'wind', chinese: '风', emoji: '💨' },
                        { word: 'tree', chinese: '树', emoji: '🌳' },
                        { word: 'flower', chinese: '花', emoji: '🌸' },
                        { word: 'grass', chinese: '草', emoji: '🌿' },
                        { word: 'mountain', chinese: '山', emoji: '⛰️' }
                    ]
                }
            ],
            
            stats: {
                wordsLearned: 0,
                correctAnswers: 0,
                badgesEarned: 0,
                currentTheme: 0,
                currentWordIndex: 0
            }
        };
        
        // ==================== 全局变量 ====================
        let audioSystem;
        let currentWordData;
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            audioSystem = new AudioSystem();
            initButtons();
            initGame();
        });
        
        function initButtons() {
            document.getElementById('autoPlayBtn').addEventListener('click', function() {
                const isActive = audioSystem.toggleAutoPlay();
                this.classList.toggle('active', isActive);
                this.innerHTML = isActive ? '<span>🔊</span> 自动播放中' : '<span>🔊</span> 自动播放';
            });
            
            document.getElementById('repeatBtn').addEventListener('click', function() {
                const isActive = audioSystem.toggleRepeat();
                this.classList.toggle('active', isActive);
                this.innerHTML = isActive ? '<span>🔁</span> 重复中' : '<span>🔁</span> 重复播放';
            });
            
            document.getElementById('muteBtn').addEventListener('click', function() {
                const isMuted = audioSystem.toggleMute();
                this.classList.toggle('active', isMuted);
                this.innerHTML = isMuted ? '<span>🔇</span> 已静音' : '<span>🔈</span> 静音';
            });
        }
        
        function initGame() {
            currentWordData = gameData.themes[0].words[0];
            updateCurrentWord();
        }
        
        // ==================== 界面控制 ====================
        function startGame() {
            document.getElementById('welcomeCard').style.display = 'none';
            document.getElementById('flashcard').style.display = 'flex';
            document.getElementById('btnGroup').style.display = 'block';
            document.getElementById('statsBar').style.display = 'flex';
            
            if (audioSystem.autoPlay) {
                setTimeout(() => playCurrentWord(), 500);
            }
        }
        
        function updateCurrentWord() {
            const theme = gameData.themes[gameData.stats.currentTheme];
            currentWordData = theme.words[gameData.stats.currentWordIndex];
            
            document.getElementById('currentEmoji').textContent = currentWordData.emoji;
            document.getElementById('currentWord').textContent = currentWordData.word;
            document.getElementById('currentTranslation').textContent = currentWordData.chinese;
        }
        
        function playCurrentWord() {
            audioSystem.speakEnglish(currentWordData.word);
        }
        
        function playCurrentTranslation() {
            audioSystem.speakChinese(currentWordData.chinese);
        }
        
        function nextWord() {
            const theme = gameData.themes[gameData.stats.currentTheme];
            gameData.stats.currentWordIndex = (gameData.stats.currentWordIndex + 1) % theme.words.length;
            
            if (gameData.stats.currentWordIndex === 0) {
                gameData.stats.currentTheme = (gameData.stats.currentTheme + 1) % gameData.themes.length;
                showBadge('theme_complete', '主题完成', '🏆');
            }
            
            updateCurrentWord();
            updateStats();
            
            if (audioSystem.autoPlay) {
                setTimeout(() => playCurrentWord(), 300);
            }
        }
        
        function repeatWord() {
            playCurrentWord();
            setTimeout(() => playCurrentTranslation(), 1500);
        }
        
        function changeTheme() {
            gameData.stats.currentTheme = (gameData.stats.currentTheme + 1) % gameData.themes.length;
            gameData.stats.currentWordIndex = 0;
            updateCurrentWord();
            
            const theme = gameData.themes[gameData.stats.currentTheme];
            audioSystem.speakChinese(`切换到${theme.name}主题`);
        }
        
        function showProgress() {
            const total = gameData.themes.reduce((sum, theme) => sum + theme.words.length, 0);
            const learned = gameData.stats.wordsLearned;
            const percentage = Math.round((learned / total) * 100);
            
            audioSystem.speakChinese(`你已经学习了${learned}个单词，总共${total}个，完成率${percentage}%`);
            alert(`📊 学习进度\n\n已学单词：${learned}/${total}\n完成率：${percentage}%\n\n继续加油！汪汪队为你骄傲！🐾`);
        }
        
        function updateStats() {
            gameData.stats.wordsLearned++;
            document.getElementById('wordCount').textContent = gameData.stats.wordsLearned;
            document.getElementById('correctCount').textContent = gameData.stats.correctAnswers;
            document.getElementById('badgeCount').textContent = gameData.stats.badgesEarned;
            
            if (gameData.stats.wordsLearned % 10 === 0) {
                showBadge('milestone', '学习达人', '🌟');
            }
        }
        
        function showBadge(id, name, emoji) {
            gameData.stats.badgesEarned++;
            document.getElementById('badgeCount').textContent = gameData.stats.badgesEarned;
            
            audioSystem.speakChinese(`恭喜你获得${name}徽章！`);
            
            const badgeMsg = `🏅 恭喜获得新徽章！\n\n${emoji} ${name}\n\n继续保持！汪汪队为你骄傲！🐾`;
            setTimeout(() => alert(badgeMsg), 500);
        }
        
        function testAudio(lang) {
            if (lang === 'en') {
                audioSystem.speakEnglish('Hello! Welcome to Paw Patrol English World!');
            } else {
                audioSystem.speakChinese('你好！欢迎来到汪汪队英语乐园！');
            }
        }
    </script>
