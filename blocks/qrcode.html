<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>扫码访问</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f5f5f5; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #FF6B35; margin-bottom: 20px; }
        .url { background: #f0f0f0; padding: 12px; border-radius: 8px; font-size: 12px; word-break: break-all; margin: 15px 0; color: #666; }
        .tip { color: #999; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🐾 汪汪队英语乐园</h2>
        <p>用手机扫描下方二维码访问：</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://shuxiaobao1900.github.io/paw-patrol-english-game/" alt="二维码" style="margin: 20px 0;">
        <div class="url">https://shuxiaobao1900.github.io/paw-patrol-english-game/</div>
        <p class="tip">💡 长按二维码可保存图片</p>
    </div>
</body>
</html>
